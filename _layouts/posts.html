---
layout: default
---

<article class="post">

  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%d %b %Y" }}
    </p>
  </header>

  <div class="post-content">
    <div class="post-content reading-width">
      {{ content }}
    </div>
  </div>

  {% if page.tags %}
  <p class="post-tags">
    <strong>Tags:</strong>
    {% for tag in page.tags %}
      <span>#{{ tag }}</span>
    {% endfor %}
  </p>
  {% endif %}

</article>
