---
layout: default
---

<h1>{{ page.title }}</h1>

{{ content }}

<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      — {{ post.date | date: "%d %b %Y" }}

      {% if post.tags %}
        <br>
        <small>
          {% for tag in post.tags %}
            #{{ tag }}
          {% endfor %}
          color: #2C5545
        </small>
      {% endif %}

    </li>
  {% endfor %}
</ul>
